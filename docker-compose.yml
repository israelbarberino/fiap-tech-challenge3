services:
  postgres:
    image: postgres:15-alpine
    container_name: hospital-postgres
    environment:
      POSTGRES_DB: hospital_platform
      POSTGRES_USER: ${POSTGRES_USER:-hospital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital -d hospital_platform"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hospital-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hospital}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me-local-rabbitmq}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  appointment-service:
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hospital_platform
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hospital}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-hospital}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-local-rabbitmq}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET:-change-me-local-jwt-secret-please-replace}
      APP_SECURITY_JWT_EXPIRATION_MINUTES: 120
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hospital_platform
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hospital}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-hospital}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-local-rabbitmq}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"

  patient-history-service:
    build:
      context: .
      dockerfile: patient-history-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hospital_platform
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hospital}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-hospital}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me-local-rabbitmq}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET:-change-me-local-jwt-secret-please-replace}
      APP_SECURITY_JWT_EXPIRATION_MINUTES: 120
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8083:8083"

volumes:
  postgres-data:
